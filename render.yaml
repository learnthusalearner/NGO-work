services:
  - type: web
    name: nayepankh-volunteer-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: DATABASE_PATH
        value: /var/data/volunteers.db
      - key: ALLOWED_ORIGINS
        sync: false # Set this in the Render Dashboard to your frontend URL
    disk:
      name: database-storage
      mountPath: /var/data
      sizeGB: 1
